- class_name: 技术博客
  class_desc: 一些值的被收藏的技术站点
  link_list: 
    - name: server-world
      link: https://www.server-world.info/en/
      avatar: https://hexo.linuser.com/static/img/logo_images/server-world.png
      descr: server-world 是一个提供有关服务器和系统管理的技术指南和教程的网站。该网站提供了广泛的主题，包括 Linux、Windows、虚拟化、网络和安全等。它的目标是帮助用户了解和学习有关服务器和系统管理的知识，以及解决常见的技术问题。在该站点上，上，您可以找到详细的安装指南、配置说明、故障排除方法和最佳实践等内容。这些内容以易于理解和实践的方式呈现，适用于各种技术水平的读者。 

    - name: 鸟哥私房菜
      link: https://linux.vbird.org/
      descr: 《鸟哥私房菜》是一个提供关于 Linux 操作系统的综合性技术指南和教程的网站。该网站由台湾的知名技术专家鸟哥（Vbird）创建和维护。它提供了广泛的 Linux 相关主题，包括操作系统安装、配置、网络、系统管理、Shell 脚本编程等内容。特点之一是其深入而易于理解的教学风格。它以简洁明了的语言和实际案例，向读者解释了 Linux 操作系统的各个方面。无论您是初学者还是有经验的 Linux 用户，都可以从中获得有价值的知识和技巧。  

