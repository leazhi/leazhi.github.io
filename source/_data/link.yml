- class_name: 域名服务
  class_desc: 一些不错的余名服务网站
  link_list:
    - name: CLOUDFLARE
      link: https://www.cloudflare.com/
      avatar: https://hexo.linuser.com/static/img/logo_images/cloudflare.png
      descr: 《Cloudflare》 是一个知名的云服务提供商和网络安全公司。它提供了一系列的网络基础设施服务，旨在提高网站的性能、安全性和可靠性。其服务包括内容分发网络（CDN）、DDoS 攻击防护、防火墙、反向代理、域名注册等。 

    - name: NameSilo
      link: https://www.namesilo.com/
      avatar: https://hexo.linuser.com/static/img/logo_images/namesilo.svg
      descr: 《NameSilo》是一个知名的域名注册和管理服务提供商。它提供了简单、可靠和经济实惠的域名注册服务。通过 Namesilo，您可以注册各种顶级域名（TLDs），如.com、.net、.org等，并管理您的域名配置和设置。 

    - name: GoDaddy
      link: https://www.godaddy.com/zh-sg/zh
      avatar: https://hexo.linuser.com/static/img/logo_images/godaddy.png
      descr: 《GoDaddy》是一个知名的域名注册和网络托管服务提供商。它 提供了广泛的互联网服务，包括域名注册、网站托管、虚拟私有服务器（VPS）、云服务器、电子邮件服务、在线商店等。 

